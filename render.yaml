services:
  - type: web
    name: sql-sp-companion
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false   # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9   # pin below 3.13 so pip finds prebuilt pydantic-core wheels
                        # instead of compiling via maturin/cargo (fails: read-only fs)
    healthCheckPath: /health
